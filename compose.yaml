
services:
  web.api:
    image: web.api
    build:
      context: .
      dockerfile: src/Web.Api/Dockerfile
    ports:
      - "5067:8080"
    volumes:
      - aspnet_keys:/home/app/.aspnet/DataProtection-Keys
    user: "1000:1000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=db;Port=5432;Database=Internship-Platform;Username=postgres;Password=postgres

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=Internship-Platform
    volumes:
      - ./.containers/intern_db:/var/lib/postgresql/data
    ports:
      - "5431:5432"  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: web.api
    command: dotnet ef database update
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - aspnet_keys:/home/app/.aspnet/DataProtection-Keys
    user: "1000:1000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Database=Host=db;Port=5432;Database=Internship-Platform;Username=postgres;Password=postgres

volumes:
  aspnet_keys:
