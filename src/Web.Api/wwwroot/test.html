<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Demo</title>
    <style>
        .main-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        #messagesList {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 20px;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }
        .user-message {
            background: #e3f2fd;
            margin-left: 20px;
        }
        .ai-message {
            background: #f5f5f5;
            margin-right: 20px;
        }
        .input-container {
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="messagesList"></div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Type your message here..."/>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.0/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Set your token and chat ID here
        const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIwMTk1NjEwYi0wNTFmLTcyNmQtYWVkYy1jMmU5MWJlZTA5ZGYiLCJlbWFpbCI6Im1vaGFtZWRzYW1pcjE3QG91dGxvb2suY29tIiwibmFtZSI6Im1yeCIsImp0aSI6IjQ2MTE4MWQzLTkxNzktNGMwYi1hNTc2LTMxYmNlNTU5MTg3NyIsImF1ZCI6WyJTd2FnZ2VyVUkiLCJTd2FnZ2VyVUkiXSwibmJmIjoxNzQxNTUzMDY0LCJleHAiOjE3NDIxNTc4NjQsImlhdCI6MTc0MTU1MzA2NCwiaXNzIjoiSW50ZXJuc2hpcC1QbGF0Zm9ybSJ9.IA01GL9nYlD0O6aJZJYpgOR4djShSf6dmEDtZUzXPps";
        const chatId = "989acb82-0af2-4c51-9af3-5b6ddffbad0a";

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/chatHub", { 
                accessTokenFactory: () => token 
            })
            .withAutomaticReconnect()
            .build();

        async function start() {
            try {
                await connection.start();
                console.log("Connected to hub");
                await connection.invoke('JoinChatSession', chatId);
            } catch (err) {
                console.error(err);
                setTimeout(start, 5000);
            }
        }

        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            
            if (!content) return;
            
            try {
                await connection.invoke('SendMessage', chatId, content);
                messageInput.value = '';
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Handle received messages
        connection.on('ReceiveMessage', (message) => {
            const messagesList = document.getElementById('messagesList');
            const messageClass = message.isFromAi ? 'ai-message' : 'user-message';
            messagesList.innerHTML += `<div class="message ${messageClass}">${marked.parse(message.content)}</div>`;
            messagesList.scrollTop = messagesList.scrollHeight;
        });

        // Handle streaming message chunks
        connection.on('ReceiveMessageChunk', (messageId, chunk) => {
            const messagesList = document.getElementById('messagesList');
            let messageElement = messagesList.querySelector(`[data-message-id="${messageId}"]`);
            
            if (!messageElement) {
                messageElement = document.createElement('div');
                messageElement.className = 'message ai-message';
                messageElement.setAttribute('data-message-id', messageId);
                messagesList.appendChild(messageElement);
            }
            
            messageElement.innerHTML = marked.parse(messageElement.textContent + chunk);
            messagesList.scrollTop = messagesList.scrollHeight;
        });

        // Start the connection
        start();

        // Add enter key support
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
